                { id: "4_sva", title: "Subject-Verb Agreement", desc: "Matching subjects and verbs.", rules: "Singular subjects require singular verbs (with 's'). Plural subjects require plural verbs (no 's').", tips: "Don't let descriptive phrases between the subject and verb confuse you!", error: "Writing 'The group of boys are playing' instead of 'is playing'.", summary: "Verbs must match the core subject's number.", examples: ["The cat drinks milk.", "The cats drink milk.", "Everyone is happy today."] },
                { id: "4_modal_adv", title: "Modal Verbs", desc: "Advice and possibilities.", rules: "Use 'should' for good advice and 'may' or 'might' for future possibilities.", tips: "Should offers helpful guidance, while may handles possibilities!", error: "Using 'should' as a strict obligation command like 'must'.", summary: "Advanced modals express varying levels of advice and certainty.", examples: ["You should read more books.", "It may rain this afternoon.", "He might join us later."] },
                { id: "4_gerunds", title: "Gerunds", desc: "Turning verbs into nouns.", rules: "Add '-ing' to a verb to use it as a noun subject or object in a sentence.", tips: "Gerunds look like actions but function as things or concepts!", error: "Confusing active continuous verbs with gerund subjects.", summary: "Gerunds allow actions to function directly as noun concepts.", examples: ["Swimming is great exercise.", "I love reading stories.", "Smoking is bad for health."] },
                { id: "4_infinitives", title: "Infinitives", desc: "Using 'to' + base verb.", rules: "Use 'to' followed by the plain base form of a verb after specific actions or adjectives.", tips: "Never add suffixes like '-ed' or '-ing' to an infinitive verb!", error: "Writing 'He decided to went home' instead of 'to go home'.", summary: "Infinitives state purposes or intents cleanly using base verbs.", examples: ["I want to learn English.", "It is easy to solve this.", "She ran to catch the bus."] },
                { id: "4_prefixes", title: "Prefixes", desc: "Changing meanings at the start.", rules: "Add prefixes like 'un-', 'dis-', or 'im-' to the front of a word to create its opposite meaning.", tips: "Prefixes change word meanings without changing their word type!", error: "Spelling prefixes wrong when adding them to baseline roots.", summary: "Front-end modifiers easily create opposite meanings.", examples: ["This room is untidy.", "I disagree with you.", "It is impossible to fly."] },
                { id: "4_suffixes", title: "Suffixes", desc: "Changing word types at the end.", rules: "Add suffixes like '-ful', '-less', or '-ment' to modify meaning or change word types.", tips: "Suffixes often turn active verbs into descriptions or nouns!", error: "Confusing descriptive suffixes with noun endings.", summary: "End-of-word extensions safely transform structural word classes.", examples: ["Be careful with that glass.", "The puppy is completely harmless.", "They shouted in excitement."] },
                { id: "4_practice", title: "Grammar Practice", desc: "Consolidating Year 4 skills.", rules: "Apply perfect tenses, subject-verb agreement, and relative pronouns to clear real tests.", tips: "Double-check your verb forms and matching subjects to ace this practice!", error: "Rushing past tense markers in mixed review questions.", summary: "Practice reinforces structural accuracy across advanced items.", examples: ["He who works hard has always achieved success.", "If she goes, I will go too.", "The car was repaired by dad."] }
            ],
            5: [
                { id: "5_perfect", title: "Perfect Tenses", desc: "Advanced perfect structures.", rules: "Master present perfect continuous: have/has + been + verb ending in '-ing'.", tips: "Use this to describe actions that started in the past and are still going on right now!", error: "Omitting 'been' from continuous perfect frameworks.", summary: "Continuous perfect tracks ongoing duration links from past to present.", examples: ["I have been studying for two hours.", "She has been coding all night.", "They have been running outside."] },
                { id: "5_passive", title: "Passive Voice", desc: "Advanced passive structures.", rules: "Convert complex past, continuous, and modal sentences into passive forms safely.", tips: "Keep the original sentence's tense intact when moving things around!", error: "Changing the baseline tense while converting to passive voice.", summary: "Advanced passive conversions preserve tense while shifting focus.", examples: ["The letter was being written by Sarah.", "Homework must be completed by you.", "The house was built in 1990."] },
                { id: "5_complex", title: "Complex Sentences", desc: "Advanced subordinating connectors.", rules: "Use advanced subordinating conjunctions like 'although', 'unless', and 'whereas' to join ideas.", tips: "Although shows surprises, while unless sets up specific negative conditions!", error: "Using 'unless' along with an extra negative modifier, creating a double negative.", summary: "Advanced conjunctions create nuanced logical relationships between clauses.", examples: ["Although it was raining, they played.", "You will fail unless you study hard.", "He loves math, whereas she loves art."] },
                { id: "5_relative", title: "Relative Clauses", desc: "Defining vs Non-defining forms.", rules: "Use commas for non-defining clauses that add extra, non-essential details.", tips: "If removing the clause changes the core meaning, do not use commas!", error: "Using 'that' inside non-defining relative clauses.", summary: "Commas separate non-essential background details from core concepts.", examples: ["My brother, who lives in London, is a chef.", "The book that I read yesterday was amazing.", "Ipoh, which is in Perak, is famous for food."] },
                { id: "5_reported", title: "Reported Speech", desc: "Reporting advanced questions.", rules: "Use 'if' or 'whether' when reporting yes/no questions, shifting tenses back.", tips: "Remove question marks and helper verbs like 'do' when reporting questions!", error: "Keeping question word order in reported statements.", summary: "Reporting questions requires shifting word order into statements.", examples: ["She asked if I had finished my work.", "He inquired where I lived.", "They asked whether he would come."] },
                { id: "5_conditionals", title: "Conditionals", desc: "Second conditional structures.", rules: "Use 'If' + Past Tense followed by 'would' + Base Verb to describe imaginary situations.", tips: "Use 'were' instead of 'was' for all subjects in imaginary structures!", error: "Using 'would' inside the 'if' clause, like 'If I would be rich...'", summary: "Second conditionals outline imaginary or hypothetical ideas safely.", examples: ["If I were a king, I would help everyone.", "She would buy a car if she had money.", "If they practiced, they would win."] },
                { id: "5_phrasal", title: "Phrasal Verbs", desc: "Combining actions with positions.", rules: "Idiomatic expressions combining a baseline verb with a preposition to create new meanings.", tips: "Look at the context puzzle to figure out the phrasal meaning!", error: "Translating individual components literally instead of reading them as a unit.", summary: "Verb-preposition pairs create unique, idiom-like action meanings.", examples: ["Please turn off the noisy radio.", "Do not give up on your dreams.", "We ran out of milk this morning."] },
                { id: "5_idioms", title: "Idioms", desc: "Native figurative phrases.", rules: "Phrases where the actual meaning is completely different from the literal words.", tips: "Idioms add color and native flair to your creative writing!", error: "Taking figurative idiomatic phrases literally.", summary: "Idioms are expressions used to convey deeper, figurative meanings.", examples: ["Passing the test was a piece of cake.", "It is raining cats and dogs outside.", "Break a leg at your concert tonight!"] },
                { id: "5_linking", title: "Linking Words", desc: "Structuring text arguments.", rules: "Use transitional words like 'furthermore', 'however', and 'therefore' to connect ideas.", tips: "Always place a comma directly after these linking words at the start of a sentence!", error: "Using 'however' without a comma or proper punctuation.", summary: "Transitions build clear structural flow between paragraphs and sentences.", examples: ["I was tired; however, I finished the job.", "Furthermore, reading improves grammar.", "Therefore, we must protect nature."] },
                { id: "5_clauses", title: "Clauses", desc: "Parsing text components.", rules: "Identify noun, adjective, and adverbial clauses working inside complex sentences.", tips: "Adverbial clauses explain when, where, why, or how actions occur!", error: "Confusing independent clauses with dependent pieces.", summary: "Mastering clauses is key to building advanced sentences.", examples: ["He left after the party ended.", "What you said made me very happy.", "The town where I was born is quiet."] },
                { id: "5_formal", title: "Formal Writing Grammar", desc: "Writing academic prose.", rules: "Avoid informal slang, contractions like 'don't', and personal shortcuts in formal essays.", tips: "Write out contractions fully (use 'do not' instead of 'don't') in formal essays!", error: "Using casual text speak or shortcuts in formal letters.", summary: "Formal tasks demand complete words and structured passive layouts.", examples: ["The research was completed successfully.", "We do not accept late submissions.", "Dear Sir, I am writing to inform you."] },
                { id: "5_editing", title: "Grammar Editing", desc: "Locating structural flaws.", rules: "Proofread paragraphs systematically to fix errors in tense, subject-verb agreement, and punctuation.", tips: "Read text sentence by sentence to check subject-verb match-ups!", error: "Skimming over small tense inconsistencies while editing.", summary: "Editing fixes hidden structural mistakes within paragraphs.", examples: ["He go to the store yesterday (Incorrect) -> He went to the store yesterday (Correct)."] },
                { id: "5_mixed", title: "Mixed Grammar", desc: "Handling random rule setups.", rules: "Handle rapid shifts between active, passive, perfect, and conditional structures.", tips: "Identify the tense and timeframe of the prompt before answering!", error: "Applying the wrong tense rule in mixed challenge formats.", summary: "Mixed evaluations build flexibility by blending multiple grammar rules.", examples: ["By the time she arrives, we will have been waiting for hours."] },

            ],
            6: [
                { id: "6_revision", title: "Complete Grammar Revision", desc: "Full Primary syllabus recap.", rules: "Review all primary rules, from basic singular/plural nouns up to complex conditional systems.", tips: "Treat every question as an opportunity to test your foundational skills!", error: "Overlooking basic rules while focusing too much on advanced structures.", summary: "Mastering the basics forms a solid foundation for advanced writing.", examples: ["She has been reading the book that I gave her yesterday."] },
                { id: "6_advanced", title: "Advanced Sentence Structures", desc: "Compound-complex configurations.", rules: "Combine multiple independent and dependent clauses into cohesive sentences.", tips: "Use punctuation like semicolons and commas to balance long sentences!", error: "Creating run-on sentences by piling clauses together without proper punctuation.", summary: "Advanced structures combine multiple ideas into one clear sentence.", examples: ["Although he was tired, he finished his work, and then he went to sleep."] },
                { id: "6_active_passive", title: "Active & Passive Voice", desc: "Strategic voice switching.", rules: "Choose active voice for direct action, and passive voice to emphasize the object or result.", tips: "Active voice keeps your writing energetic; passive voice keeps it objective!", error: "Using passive voice excessively, making writing sound wordy and weak.", summary: "Strategic voice selection changes the focus of your writing.", examples: ["The chef prepared the food (Active). The food was prepared by the chef (Passive)."] },
                { id: "6_tenses_rev", title: "Tenses Review", desc: "Mastering all 12 time frames.", rules: "Differentiate accurately between simple, continuous, perfect, and perfect continuous tenses.", tips: "Check the timeline of the action to choose the perfect verb tense!", error: "Shifting tenses inconsistently within a single paragraph.", summary: "Tense consistency keeps your timelines clear and logical.", examples: ["I was working on my project while my brother was playing games."] },
                { id: "6_reported_adv", title: "Reported Speech", desc: "Advanced changes and shifts.", rules: "Shift pronouns, time expressions (e.g., 'tomorrow' to 'the next day'), and tenses accurately.", tips: "Remember to change 'here' to 'there' and 'this' to 'that' in reported speech!", error: "Forgetting to change time markers like 'yesterday' when reporting speech.", summary: "Advanced reported speech requires shifting tenses, pronouns, and time markers.", examples: ["She said she had visited Malacca the previous week."] },
                { id: "6_conditionals_all", title: "Conditionals", desc: "Third conditional frameworks.", rules: "Use 'If' + Past Perfect followed by 'would have' + Past Participle for past regrets.", tips: "The third conditional talks about imaginary past events that didn't actually happen!", error: "Mixing up second and third conditional verb forms in the same sentence.", summary: "Third conditionals evaluate alternative past outcomes and regrets.", examples: ["If I had studied harder, I would have passed the exam."] },
                { id: "6_relative_adv", title: "Relative Clauses", desc: "Omitting relative pronouns safely.", rules: "Drop the relative pronoun (who/which/that) when it acts as the object of the clause.", tips: "You can safely omit the pronoun if a new subject immediately follows it!", error: "Omitting the pronoun when it functions as the core subject of the clause.", summary: "Dropping object pronouns makes your writing sound more natural.", examples: ["The movie I watched last night was scary (Pronoun 'that' omitted)."] },
                { id: "6_error_corr", title: "Error Correction", desc: "Advanced editing strategies.", rules: "Identify and correct subtle grammar, spelling, and structural mistakes in texts.", tips: "Scan specifically for subject-verb agreement and parallel structures!", error: "Missing subtle tense mismatches while editing sentences.", summary: "Advanced error correction builds an eye for clean writing.", examples: ["Neither of the options are good (Incorrect) -> Neither of the options is good (Correct)."] },
                { id: "6_writing_gram", title: "Grammar in Writing", desc: "Applying rules to narratives.", rules: "Use a variety of sentence structures and precise grammar to write interesting essays.", tips: "Mix short, punchy sentences with longer complex ones to keep readers engaged!", error: "Using repetitive sentence patterns, making your writing sound boring.", summary: "Varied sentence structures make writing engaging and rhythmic.", examples: ["Walking through the forest, the girl discovered an old, abandoned cabin."] },
                { id: "6_upsa", title: "Grammar for UPSA-style questions", desc: "Exam-format practice preparation.", rules: "Practice specific exam formats like multiple-choice cloze tests and text correction.", tips: "Read the entire context paragraph before picking an answer choice!", error: "Choosing answers based on sound alone without checking the underlying rule.", summary: "Targeted practice builds test-taking confidence and accuracy.", examples: ["Choose the most suitable word to fill in the blank space accurately."] },
                { id: "6_mixed_master", title: "Mixed Grammar", desc: "Elite mixed rule integrations.", rules: "Solve advanced grammar challenges that combine multiple complex rules simultaneously.", tips: "Break down long sentences into individual clauses to analyze them easily!", error: "Getting overwhelmed by complex questions with multiple rules.", summary: "Mastering mixed rules develops native-like fluency.", examples: ["Had I known about the rules, I would have behaved differently."] },
                { id: "6_hots", title: "Higher Order Thinking Grammar", desc: "Analytical grammar usage.", rules: "Analyze how subtle changes in grammar completely alter sentence meanings.", tips: "Pay close attention to how punctuation shifts the focus of a sentence!", error: "Assuming different grammatical structures always mean the exact same thing.", summary: "Analytical grammar explores how structure creates meaning.", examples: ["He stopped smoking (Quit habit) vs He stopped to smoke (Paused to take a break)."] },
                { id: "6_final_rev", title: "Final Revision", desc: "Ultimate primary mastery test.", rules: "Run a full simulation of all grammar concepts to ensure complete readiness.", tips: "Treat this final review as your ultimate check before moving on!", error: "Rushing through foundational questions in the final review.", summary: "Final reviews ensure you have mastered all core concepts.", examples: ["We have successfully reviewed the complete primary grammar syllabus."] },
                { id: "6_master", title: "Master Grammar", desc: "Achieving top fluency.", rules: "Demonstrate elite mastery of English grammar across all primary school topics.", tips: "Consistent practice is the secret to maintaining top fluency!", error: "Stopping practice after achieving a single perfect score.", summary: "True grammar mastery unlocks confident communication skills.", examples: ["You are now fully equipped with advanced English grammar skills!"] }
            ]
        };

        // --- AVATAR ENGINE GRAPHICS DATABASE (INLINE SVGs) ---
        const AVATARS = [
            `<svg viewBox="0 0 128 128" class="w-full h-full"><circle cx="64" cy="64" r="60" fill="#FF6B6B"/><circle cx="45" cy="50" r="6" fill="#FFF"/><circle cx="83" cy="50" r="6" fill="#FFF"/><circle cx="45" cy="50" r="3" fill="#000"/><circle cx="83" cy="50" r="3" fill="#000"/><path d="M40 80 Q64 105 88 80" stroke="#FFF" stroke-width="6" fill="none" stroke-linecap="round"/><circle cx="30" cy="40" r="8" fill="#FFE066"/><circle cx="98" cy="40" r="8" fill="#FFE066"/></svg>`,

            `<svg viewBox="0 0 128 128" class="w-full h-full"><circle cx="64" cy="64" r="60" fill="#FF922B"/><polygon points="64,25 74,45 96,45 78,58 85,80 64,68 43,80 50,58 32,45 54,45" fill="#FFF"/><circle cx="52" cy="50" r="4" fill="#000"/><circle cx="76" cy="50" r="4" fill="#000"/><path d="M54 62 Q64 70 74 62" stroke="#000" stroke-width="2" fill="none"/></svg>`
        ];

        // --- STATE MANAGEMENT ENGINE ---
        let STATE = {
            profiles: {},
            currentProfileId: null,
            activeView: "welcome",
            theme: "light",
            audioEnabled: true,
            currentQuiz: null,
            viewHistory: []
        };

        // --- INITIALIZATION & LOCALSTORAGE SYNC ---
        function initApp() {
            const savedState = localStorage.getItem("BIJAK_GRAMMAR_STATE");
            if (savedState) {
                try {
                    const parsed = JSON.parse(savedState);
                    STATE.profiles = parsed.profiles || {};
                    STATE.currentProfileId = parsed.currentProfileId || null;
                    STATE.theme = parsed.theme || "light";
                    STATE.audioEnabled = parsed.audioEnabled !== undefined ? parsed.audioEnabled : true;
                } catch (e) {
                    console.error("State recovery error, resetting fallback system data.", e);
                }
            }
            applyTheme();
            
            if (STATE.currentProfileId && STATE.profiles[STATE.currentProfileId]) {
                navigate("home");
            } else {
                navigate("welcome");
            }
        }

        function saveState() {
            localStorage.setItem("BIJAK_GRAMMAR_STATE", JSON.stringify({
                profiles: STATE.profiles,
                currentProfileId: STATE.currentProfileId,
                theme: STATE.theme,
                audioEnabled: STATE.audioEnabled
            }));
        }

        function applyTheme() {
            if (STATE.theme === "dark") {
                document.documentElement.classList.add("dark");
            } else {
                document.documentElement.classList.remove("dark");
            }
        }

        // --- GLOBAL NAVIGATION SYSTEMS ---
        function navigate(viewName, appendToHistory = true) {
            if (appendToHistory && STATE.activeView !== viewName) {
                STATE.viewHistory.push(STATE.activeView);
            }
            STATE.activeView = viewName;
            
            // Layout adjustments based on view context
            const header = document.getElementById("global-header");
            const nav = document.getElementById("bottom-nav");
            
            if (["welcome", "create_profile"].includes(viewName)) {
                header.classList.add("hidden");
                nav.classList.add("hidden");
            } else {
                header.classList.remove("hidden");
                updateHeaderUI();
                
                if (["home", "topics", "challenges", "profile"].includes(viewName)) {
                    nav.classList.remove("hidden");
                    updateBottomNavUI(viewName);
                } else {
                    nav.classList.add("hidden");
                }
            }

            // Route execution
            const container = document.getElementById("view-container");
            container.scrollTop = 0;
            
            switch(viewName) {
                case "welcome": renderWelcomeView(container); break;
                case "create_profile": renderCreateProfileView(container); break;
                case "home": renderHomeView(container); break;
                case "topics": renderTopicsView(container); break;
                case "challenges": renderChallengesView(container); break;
                case "profile": renderProfileView(container); break;
                case "lesson": renderLessonView(container); break;
                case "quiz": renderQuizView(container); break;
                case "quiz_result": renderQuizResultView(container); break;
                case "achievements": renderAchievementsView(container); break;
                case "progress": renderProgressDetailsView(container); break;
                case "settings": renderSettingsView(container); break;
            }
        }

        document.getElementById("btn-back-nav").addEventListener("click", () => {
            if (STATE.viewHistory.length > 0) {
                const prev = STATE.viewHistory.pop();
                navigate(prev, false);
            } else {
                navigate("home");
            }
        });

        function updateHeaderUI() {
            const profile = STATE.profiles[STATE.currentProfileId];
            if (!profile) return;
            document.getElementById("header-stars").innerText = profile.stars || 0;
            const avatarBox = document.getElementById("header-avatar-container");
            if (profile.customPhoto) {
                avatarBox.innerHTML = `<img src="${profile.customPhoto}" class="w-full h-full object-cover rounded-full">`;
            } else {
                avatarBox.innerHTML = AVATARS[profile.avatarIndex || 0];
            }
            
            // Simple logic for subheadings
            if (STATE.activeView === "lesson" && STATE.currentLesson) {
                document.getElementById("header-title").innerText = STATE.currentLesson.title;
                document.getElementById("header-subtitle").innerText = `Year ${profile.year} • Lesson`;
            } else if (STATE.activeView === "quiz" && STATE.currentQuiz) {
                document.getElementById("header-title").innerText = "Quiz Mode";
                document.getElementById("header-subtitle").innerText = STATE.currentQuiz.topicTitle;
            } else {
                document.getElementById("header-title").innerText = "Bijak Grammar";
                document.getElementById("header-subtitle").innerText = `Hello, ${profile.name}!`;
            }
        }

        function updateBottomNavUI(activeTarget) {
            document.querySelectorAll(".nav-item").forEach(btn => {
                if (btn.getAttribute("data-target") === activeTarget) {
                    btn.className = "nav-item flex flex-col items-center gap-0.5 text-indigo-600 dark:text-indigo-400 bg-indigo-50 dark:bg-slate-700/50 px-3 py-1.5 rounded-xl transition-all";
                } else {
                    btn.className = "nav-item flex flex-col items-center gap-0.5 text-slate-400 dark:text-slate-500 px-3 py-1.5 rounded-xl transition-all";
                }
            });
        }

        document.querySelectorAll(".nav-item").forEach(btn => {
            btn.addEventListener("click", (e) => {
                const target = e.currentTarget.getAttribute("data-target");
                navigate(target);
            });
        });

        document.getElementById("header-avatar-container").addEventListener("click", () => {
            navigate("profile");
        });

        // --- AUDIO ENGINE ---
        function speakText(text) {
            if (!STATE.audioEnabled) return;
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'en-US';
                utterance.rate = 0.85; // Natural speed for kids
                window.speechSynthesis.speak(utterance);
            }
        }

        // --- PROCEDURAL GENERATOR FOR THE SMART QUESTION ENGINE ---
        function generateProceduralQuestions(topicId, year, count = 15) {
            let list = [];
            // Seed base dictionary mapping variations to create dynamic programmatic question banks
            const basePool = {
                "1_alphabet": [
                    { q: "Which one is a capital letter?", t: "mcq", o: ["A", "b", "c", "d"], a: "A" },
                    { q: "Complete the alphabet sequence: A, B, C, __", t: "blank", a: "D", ex: "D completes the sequence." },
                    { q: "Is 'e' a capital letter?", t: "tf", o: ["True", "False"], a: "False" },
                    { q: "Choose the correct small letter for 'G'.", t: "mcq", o: ["g", "q", "p", "d"], a: "g" },
                    { q: "Find the letter that matches with 'Apple'.", t: "word", o: ["A", "B", "M", "Z"], a: "A" }
                ],
                "1_capital": [
                    { q: "Choose the correct sentence.", t: "sentence", o: ["I love my mother.", "i love my mother.", "I love My mother."], a: "I love my mother." },
                    { q: "Fix the mistake: my name is Adam.", t: "correction", a: "My name is Adam.", orig: "my name is Adam." },
                    { q: "Which word needs a capital letter in: 'we live in malaysia.'", t: "mcq", o: ["we and malaysia", "live", "in", "none"], a: "we and malaysia" }
                ],
                "1_nouns": [
                    { q: "Which word is a common noun representing a place?", t: "mcq", o: ["school", "happy", "run", "beautiful"], a: "school" },
                    { q: "Identify the object noun: 'The blue pen is on my table.'", t: "word", o: ["pen", "blue", "on", "is"], a: "pen" }
                ],
                "default": [
                    { q: "Select the grammatically correct option.", t: "mcq", o: ["They are learning English.", "They is learning English.", "They am learning English."], a: "They are learning English." },
                    { q: "True or False: We use full stops at the start of sentences.", t: "tf", o: ["True", "False"], a: "False" },
                    { q: "Fix the missing word: She ____ a bright student.", t: "blank", a: "is" }
                ]
            };

            let source = basePool[topicId] || basePool["default"];
            
            // Programmatic generation logic to scale questions to exactly 15 without duplicates
            for (let i = 0; i < count; i++) {
                let template = source[i % source.length];
                let item = JSON.parse(JSON.stringify(template)); // deep clone
                
                // Add variety modifiers dynamically based on iterations
                if (i >= source.length) {
                    item.q += ` (Set ${Math.floor(i / source.length) + 1})`;
                }
                
                // Assign a default fallback archetype if missing
                if (!item.t) item.t = "mcq";
                if (!item.o) item.o = [item.a, "Option X", "Option Y", "Option Z"];
                
                // Set structural standard rules explanations
                item.rule = item.ex || "Follow KSSR grammar compliance tracking guidelines.";
                item.msg = ["Excellent!", "Great Job!", "Keep Going!", "Fantastic!", "Almost There!"][i % 5];
                
                // Fisher-Yates array shuffling for dynamic answer positions
                if (item.o && item.o.length > 1) {
                    for (let j = item.o.length - 1; j > 0; j--) {
                        const k = Math.floor(Math.random() * (j + 1));
                        [item.o[j], item.o[k]] = [item.o[k], item.o[j]];
                    }
                }
                list.push(item);
            }
            
            // Shuffle final question output sequence
            for (let j = list.length - 1; j > 0; j--) {
                const k = Math.floor(Math.random() * (j + 1));
                [list[j], list[k]] = [list[k], list[j]];
            }
            return list;
        }

        function processQuizCompletion() {
            const qz = STATE.currentQuiz;
            const profile = STATE.profiles[STATE.currentProfileId];
            
            const total = qz.questions.length;
            const finalPct = Math.round((qz.score / total) * 100);
            const timeElapsed = Math.round((Date.now() - qz.startTime) / 1000);
            
            // Calculate star allocation reward payload structures parameters metrics items
            let starsEarned = 0;
            if (finalPct === 100) starsEarned = 3;
            else if (finalPct >= 80) starsEarned = 2;
            else if (finalPct >= 50) starsEarned = 1;

            // Save historical profile analytics telemetry metrics data states inside device storage
            profile.stars = (profile.stars || 0) + starsEarned;
            
            if (!profile.scores) profile.scores = {};
            if (!profile.scores[qz.topicId] || qz.score > profile.scores[qz.topicId]) {
                profile.scores[qz.topicId] = qz.score;
            }

            if (finalPct >= 80 && !profile.completedTopics.includes(qz.topicId)) {
                profile.completedTopics.push(qz.topicId);
            }

            // Process dynamic award badge achievements allocations criteria evaluations system loop checks
            if (!profile.achievements) profile.achievements = [];
            
            if (profile.completedTopics.length >= 1 && !profile.achievements.includes("beginner")) {
                profile.achievements.push("beginner");
            }
            if (finalPct === 100 && !profile.achievements.includes("perfect")) {
                profile.achievements.push("perfect");
            }
            if (profile.stars >= 30 && !profile.achievements.includes("hero")) {
                profile.achievements.push("hero");
            }

            saveState();
            
            // Trigger confetti particles graphics rendering engine directly if matching parameters rules conditions
            if (finalPct === 100 && typeof confetti === 'function') {
                confetti({ particleCount: 150, spread: 80, origin: { y: 0.6 } });
            }

            navigate("quiz_result");
        }

            ];

            c.innerHTML = `
                <div class="space-y-4 flex-1 flex flex-col overflow-hidden pb-2">
                    <div class="text-center">
                        <h2 class="heading-font text-2xl font-bold text-indigo-600 dark:text-indigo-400">Achievements</h2>
                        <p class="text-xs text-slate-400">Unlock special badges by hitting key learning milestones!</p>
                    </div>

                    <div class="flex-1 overflow-y-auto space-y-3 pr-1">
                        ${badgesRef.map(b => {
                            // Verify status
                            const unlocked = earned.includes(b.id) || b.id === "explorer"; // explorer unlocked by default usage parameter tracking
                            return `
                                <div class="bg-white dark:bg-slate-800 border rounded-2xl p-4 flex items-center gap-4 transition-all ${unlocked ? 'border-slate-100 dark:border-slate-700 opacity-100 shadow-sm' : 'border-slate-200 dark:border-slate-700/50 opacity-50 select-none grayscale' }">
                                    <div class="w-14 h-14 rounded-xl bg-gradient-to-br ${b.color} text-white flex items-center justify-center text-2xl shadow shadow-md shrink-0 relative">
                                        <i class="fa-solid ${b.icon}"></i>
                                        ${unlocked ? '<div class="absolute -right-1 -top-1 w-4 h-4 rounded-full bg-emerald-500 border border-white flex items-center justify-center text-[8px] text-white font-bold"><i class="fa-solid fa-check"></i></div>' : ''}
                                    </div>
                                    <div class="text-left space-y-0.5">
                                        <h4 class="font-bold text-sm text-slate-800 dark:text-slate-100">${b.title}</h4>
                                        <p class="text-xs text-slate-400 dark:text-slate-400 leading-normal">${b.desc}</p>
                                        <span class="text-[10px] font-bold ${unlocked ? 'text-emerald-500' : 'text-slate-400' }">${unlocked ? 'Unlocked & Active' : 'Locked' }</span>
                                    </div>
                                </div>
                            `;
                        }).join('')}
                    </div>
                </div>
            `;
        }

        function renderProgressDetailsView(c) {
            const profile = STATE.profiles[STATE.currentProfileId];
            
            // Calculate a synthetic estimation scale metric mapping for completeness tracking
            const totalSyllabusItemsCount = Object.values(SYLLABUS_DATABASE).reduce((acc, curr) => acc + curr.length, 0);
            const passedCount = profile.completedTopics.length;
            const completionPct = Math.round((passedCount / totalSyllabusItemsCount) * 100);

            c.innerHTML = `
                <div class="space-y-4 flex-1 flex flex-col justify-start overflow-hidden pb-4">
                    <div class="text-center">
                        <h2 class="heading-font text-2xl font-bold text-indigo-600 dark:text-indigo-400">Progress Tracker</h2>
                        <p class="text-xs text-slate-400">Real-time breakdown of your grammar metrics and scores.</p>
                    </div>

                    <!-- Macro Completion Card Gauge bar alignment panel row stack structural display component grid template -->
                    <div class="bg-white dark:bg-slate-800 border border-slate-100 dark:border-slate-700 p-5 rounded-2xl shadow-sm text-center space-y-3">
                        <span class="text-xs font-bold text-slate-400 uppercase tracking-widest block">Syllabus Completion Gauge</span>
                        <div class="relative w-28 h-28 mx-auto flex items-center justify-center bg-indigo-50 dark:bg-slate-700 rounded-full border-4 border-indigo-500 shadow-inner">
                            <span class="heading-font text-2xl font-black text-indigo-600 dark:text-indigo-400">${completionPct}%</span>
                        </div>
                        <p class="text-xs text-slate-500 dark:text-slate-400 max-w-xs mx-auto font-medium leading-normal">You have completed and successfully certified in <strong class="text-slate-700 dark:text-slate-200">${passedCount} out of ${totalSyllabusItemsCount}</strong> total structured grammar focus topic tracks.</p>
                    </div>

                    <!-- Micro Metric Data Table Panel rows cards -->
                    <div class="bg-white dark:bg-slate-800 rounded-2xl p-4 border border-slate-100 dark:border-slate-700 shadow-sm space-y-3 flex-1 overflow-y-auto">
                        <h3 class="text-xs font-extrabold uppercase tracking-wider text-slate-400"><i class="fa-solid fa-chart-pie mr-1"></i> Core Learning Statistics</h3>
                        
                        <div class="divide-y divide-slate-100 dark:divide-slate-700 text-xs">
                            <div class="py-2.5 flex justify-between items-center">
                                <span class="font-medium text-slate-500">Current Learning Level Rank</span>
                                <span class="font-bold text-indigo-600 dark:text-indigo-400">Year ${profile.year} Curriculum</span>
                            </div>
                            <div class="py-2.5 flex justify-between items-center">
                                <span class="font-medium text-slate-500">Total Reward Stars Collected</span>
                                <span class="font-bold text-amber-500"><i class="fa-solid fa-star mr-0.5"></i> ${profile.stars || 0}</span>
                            </div>
                            <div class="py-2.5 flex justify-between items-center">
                                <span class="font-medium text-slate-500">Active Daily Streak Period</span>
                                <span class="font-bold text-rose-500"><i class="fa-solid fa-fire mr-0.5"></i> ${profile.streak || 1} Days Active</span>
                            </div>
                            <div class="py-2.5 flex justify-between items-center">
                                <span class="font-medium text-slate-500">Verified Badges Unlocked</span>
                                <span class="font-bold text-purple-600 dark:text-purple-400">${profile.achievements ? profile.achievements.length + 1 : 1} Badges</span>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        function renderSettingsView(c) {
            const profile = STATE.profiles[STATE.currentProfileId];
            c.innerHTML = `
                <div class="space-y-4 flex-1 flex flex-col justify-start pb-4">
                    <div class="text-center py-1">
                        <h2 class="heading-font text-2xl font-bold text-indigo-600 dark:text-indigo-400">Settings</h2>
                        <p class="text-xs text-slate-400">Configure application toggles and local profiles states.</p>
                    </div>

                    <div class="bg-white dark:bg-slate-800 rounded-2xl p-4 border border-slate-100 dark:border-slate-700 shadow-sm space-y-4">
                        <h3 class="text-xs font-bold uppercase text-slate-400 tracking-wider"><i class="fa-solid fa-sliders mr-1"></i> Preferences Toggles</h3>
                        
                        <!-- Toggle Row Sound Audio Pronunciation tracking -->
                        <div class="flex items-center justify-between border-b border-slate-50 dark:border-slate-700 pb-3">
                            <div>
                                <span class="text-xs font-bold block">Audio Pronunciation Speech Output</span>
                                <span class="text-[10px] text-slate-400 block font-medium">Plays native English audio on tap events</span>
                            </div>
                            <button id="toggle-audio-btn" class="w-12 h-6 rounded-full transition-all relative ${STATE.audioEnabled ? 'bg-indigo-600' : 'bg-slate-300 dark:bg-slate-600' }">
                                <div class="w-4 h-4 rounded-full bg-white absolute top-1 transition-all ${STATE.audioEnabled ? 'right-1' : 'left-1' }"></div>
                            </button>
                        </div>

                        <!-- Toggle Row Dark Mode configuration system -->
                        <div class="flex items-center justify-between border-b border-slate-50 dark:border-slate-700 pb-3">
                            <div>
                                <span class="text-xs font-bold block">High Contrast Dark Interface Theme</span>
                                <span class="text-[10px] text-slate-400 block font-medium">Optimizes viewing comfort for evening study</span>
                            </div>
                            <button id="toggle-dark-btn" class="w-12 h-6 rounded-full transition-all relative ${STATE.theme === 'dark' ? 'bg-indigo-600' : 'bg-slate-300 dark:bg-slate-600' }">
                                <div class="w-4 h-4 rounded-full bg-white absolute top-1 transition-all ${STATE.theme === 'dark' ? 'right-1' : 'left-1' }"></div>
                            </button>
                        </div>
                    </div>

                    <!-- Hard Master Systems Resets Management Operations controls rows panel blocks component lists buttons links structural configuration -->
                    <div class="bg-white dark:bg-slate-800 rounded-2xl p-4 border border-slate-100 dark:border-slate-700 shadow-sm space-y-2">
                        <h3 class="text-xs font-bold uppercase text-slate-400 tracking-wider mb-2"><i class="fa-solid fa-triangle-exclamation mr-1"></i> Danger Zone Operations</h3>
                        
                        <button id="btn-reset-app" class="w-full bg-rose-50 hover:bg-rose-100 text-rose-600 dark:bg-rose-950/20 dark:hover:bg-rose-900/30 font-bold text-xs py-3 rounded-xl transition-all border border-rose-200/40 flex items-center justify-center gap-1">
                            <i class="fa-solid fa-trash-can"></i> Erase All Profile Data & Scores
                        </button>
                    </div>
                </div>
            `;

            // Wire UI interactivity listeners
            const audBtn = document.getElementById("toggle-audio-btn");
            audBtn.addEventListener("click", () => {
                STATE.audioEnabled = !STATE.audioEnabled;
                saveState();
                audBtn.className = `w-12 h-6 rounded-full transition-all relative ${STATE.audioEnabled ? 'bg-indigo-600' : 'bg-slate-300 dark:bg-slate-600' }`;
                audBtn.querySelector("div").className = `w-4 h-4 rounded-full bg-white absolute top-1 transition-all ${STATE.audioEnabled ? 'right-1' : 'left-1' }`;
                updateHeaderUI();
            });

            const dkBtn = document.getElementById("toggle-dark-btn");
            dkBtn.addEventListener("click", () => {
                STATE.theme = STATE.theme === "dark" ? "light" : "dark";
                saveState();
                applyTheme();
                dkBtn.className = `w-12 h-6 rounded-full transition-all relative ${STATE.theme === 'dark' ? 'bg-indigo-600' : 'bg-slate-300 dark:bg-slate-600' }`;
                dkBtn.querySelector("div").className = `w-4 h-4 rounded-full bg-white absolute top-1 transition-all ${STATE.theme === 'dark' ? 'right-1' : 'left-1' }`;
            });

            document.getElementById("btn-reset-app").addEventListener("click", () => {
                if (confirm("Are you absolutely sure you want to clear everything? This will permanently wipe all created profile records and progress scores on this local device. This action cannot be reversed.")) {
                    localStorage.removeItem("BIJAK_GRAMMAR_STATE");
                    STATE.profiles = {};
                    STATE.currentProfileId = null;
                    STATE.theme = "light";
                    STATE.audioEnabled = true;
                    applyTheme();
                    navigate("welcome");
                }
            });
        }

        // --- LAUNCH APPLICATION KICKSTART TRIGGER ---
        window.addEventListener("DOMContentLoaded", () => {
            initApp();
        });
    </script>
</body>
</html>
